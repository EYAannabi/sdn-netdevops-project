---
- name: Ensure tmux is installed
  apt:
    name: tmux
    state: present
  become: yes

- name: Check whether the Mininet topology is already running (via OVS)
  shell: ovs-vsctl list-br
  become: yes
  register: existing_ovs
  changed_when: false
  failed_when: false

- name: Show current bridge status
  debug:
    msg: "Current bridges: {{ existing_ovs.stdout_lines | default(['No bridge detected']) }}"

- name: Remove the old tmux session if it exists
  shell: tmux kill-session -t mininet_lab
  become: yes
  ignore_errors: true

- name: Start the LAB topology in a tmux session (if missing)
  shell: >
    tmux new-session -d -s mininet_lab 'sudo env PYTHONDONTWRITEBYTECODE=1 python3 {{ playbook_dir }}/../topology/start_lab_topology.py'
  become: yes
  when: existing_ovs.stdout == ""
  register: tmux_result

- name: Show tmux start result
  debug:
    msg: "Tmux session started with return code: {{ tmux_result.rc }}"

- name: Wait for topology to fully initialize
  pause:
    seconds: 150
  when: existing_ovs.stdout == ""

- name: Check if Mininet process is running
  shell: pgrep -f "python3.*start_lab_topology.py"
  become: yes
  register: mininet_process
  changed_when: false
  failed_when: false

- name: Show Mininet process check
  debug:
    msg: "Mininet process found: {{ mininet_process.stdout_lines | default(['Not found']) }}"

- name: Get tmux session details
  shell: tmux display-message -p '#{session_name} #{session_windows}'
  become: yes
  ignore_errors: true
  changed_when: false

- name: Verify that OVS bridges now exist
  shell: ovs-vsctl list-br
  become: yes
  register: final_ovs_bridges
  retries: 5
  delay: 10
  until: final_ovs_bridges.stdout_lines | length > 0
  changed_when: false

- name: Show final OVS bridges
  debug:
    msg: "{{ final_ovs_bridges.stdout_lines }}"

- name: Show bridges count
  debug:
    msg: "Total bridges created: {{ final_ovs_bridges.stdout_lines | length }}"
