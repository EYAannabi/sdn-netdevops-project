---
- name: Ensure tmux is installed
  apt:
    name: tmux
    state: present
  become: yes

- name: Check whether the Mininet topology is already running (via OVS)
  shell: ovs-vsctl list-br
  become: yes
  register: existing_ovs
  changed_when: false
  failed_when: false

- name: Show current bridge status
  debug:
    msg: "Current bridges: {{ existing_ovs.stdout_lines | default(['No bridge detected']) }}"

- name: Remove the old tmux session if it exists
  shell: tmux kill-session -t mininet_lab
  become: yes
  ignore_errors: true

- name: Start the LAB topology in a tmux session (if missing)
  shell: >
    tmux new-session -d -s mininet_lab 'sudo env PYTHONDONTWRITEBYTECODE=1 python3 {{ playbook_dir }}/../topology/start_lab_topology.py'
  become: yes
  when: existing_ovs.stdout == ""

- name: Wait a few seconds for the topology to start (if newly launched)
  pause:
    seconds: 60
  when: existing_ovs.stdout == ""

- name: Verify that OVS bridges now exist
  shell: ovs-vsctl list-br
  become: yes
  register: final_ovs_bridges
  failed_when: final_ovs_bridges.stdout_lines | length == 0
  changed_when: false

- name: Show final OVS bridges
  debug:
    msg: "{{ final_ovs_bridges.stdout_lines }}"
