---
- name: Ensure tmux is installed
  apt:
    name: tmux
    state: present
  become: yes

- name: Check whether the Mininet topology is already running (via OVS)
  shell: ovs-vsctl list-br
  become: yes
  register: existing_ovs
  changed_when: false
  failed_when: false

- name: Show current bridge status
  debug:
    msg: "Current bridges: {{ existing_ovs.stdout_lines | default(['No bridge detected']) }}"

- name: Check if mininet_lab tmux session exists
  shell: tmux has-session -t mininet_lab
  become: yes
  register: mininet_tmux
  failed_when: false
  changed_when: false

- name: Check if Mininet topology process is running
  shell: pgrep -f "start_lab_topology.py" || true
  become: yes
  register: mininet_pid
  failed_when: false
  changed_when: false

- name: Show topology runtime status
  debug:
    msg:
      - "tmux session rc: {{ mininet_tmux.rc }}"
      - "mininet pid: {{ mininet_pid.stdout_lines | default([]) }}"
      - "bridges: {{ existing_ovs.stdout_lines | default([]) }}"

- name: Cleanup stale Mininet topology if session or process is missing
  shell: |
    if tmux has-session -t mininet_lab 2>/dev/null; then
      tmux kill-session -t mininet_lab
    fi
    for br in $(ovs-vsctl list-br); do
      ovs-vsctl --if-exists del-br "$br"
    done
  become: yes
  when: mininet_pid.stdout == "" or mininet_tmux.rc != 0

- name: Start the LAB topology in a tmux session
  shell: >
    tmux new-session -d -s mininet_lab 'sudo env PYTHONDONTWRITEBYTECODE=1 python3 {{ playbook_dir }}/../topology/start_lab_topology.py'
  become: yes
  when: mininet_pid.stdout == "" or mininet_tmux.rc != 0

- name: Wait a few seconds for the topology to start
  pause:
    seconds: 15
  when: mininet_pid.stdout == "" or mininet_tmux.rc != 0

- name: Verify that OVS bridges now exist
  shell: ovs-vsctl list-br
  become: yes
  register: final_ovs_bridges
  failed_when: final_ovs_bridges.stdout_lines | length == 0
  changed_when: false

- name: Show final OVS bridges
  debug:
    msg: "{{ final_ovs_bridges.stdout_lines }}"
