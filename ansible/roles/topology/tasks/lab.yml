---
- name: Vérifier si la topologie Mininet tourne déjà (via OVS)
  shell: ovs-vsctl list-br
  become: yes
  register: existing_ovs
  changed_when: false
  failed_when: false

- name: Afficher le statut actuel des bridges
  debug:
    msg: "Bridges actuels : {{ existing_ovs.stdout_lines | default(['Aucun bridge détecté']) }}"

- name: Démarrer la topologie LAB si elle est absente
  shell: >
    nohup python3 {{ playbook_dir }}/../topology/start_lab_topology.py
    > /tmp/mininet-lab.log 2>&1 < /dev/null &
  become: yes
  environment:
    PYTHONDONTWRITEBYTECODE: "1"
  when: existing_ovs.stdout == ""

- name: Attendre quelques secondes que la topologie démarre (si nouvellement lancée)
  pause:
    seconds: 15
  when: existing_ovs.stdout == ""

- name: Vérifier que des bridges OVS existent maintenant
  shell: ovs-vsctl list-br
  become: yes
  register: final_ovs_bridges
  failed_when: final_ovs_bridges.stdout_lines | length == 0
  changed_when: false

- name: Afficher les bridges OVS finaux
  debug:
    msg: "{{ final_ovs_bridges.stdout_lines }}"