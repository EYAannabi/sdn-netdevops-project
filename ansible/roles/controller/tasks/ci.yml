- name: Clean up the previous Mininet environment
  shell: mn -c
  become: yes
  ignore_errors: yes

- name: Start the test topology and run automated network tests
  shell: python3 {{ playbook_dir }}/../tests/network_tests.py
  become: yes
  register: test_results

- name: Show CI test results
  debug:
    msg: "{{ test_results.stdout_lines }}"
