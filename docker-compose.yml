version: "3.8"

services:
  ryu_exporter:
    build:
      context: .
      dockerfile: docker/Dockerfile.exporter
    container_name: ryu_exporter
    environment:
      - RYU_STATS_URL=http://sdn-controller:8080/stats/port/ALL
    ports:
      - "8000:8000"
    networks:
      - sdn_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - sdn_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    networks:
      - sdn_net
    restart: unless-stopped

networks:
  sdn_net:
    name: sdn_net